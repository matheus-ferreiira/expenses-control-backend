version: "3.8"

services:
  app:
    build: .
    container_name: expense_backend_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: expenses_control
      DB_USERNAME: laravel
      DB_PASSWORD: root
    extra_hosts:
      - "host.docker.internal:host-gateway"